name: Publish — Marketplace

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (package without publishing)"
        type: boolean
        default: false
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Build & Publish VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build

      - name: Install tfx-cli
        run: npm install -g tfx-cli

      - name: Package VSIX
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cd apps/argos-extension
          tfx extension create \
            --manifest-globs vss-extension.json \
            --output-path "$GITHUB_WORKSPACE/dist/argos.vsix" \
            --no-prompt

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: argos-vsix
          path: ${{ github.workspace }}/dist/argos.vsix
          retention-days: 30

      - name: Publish to Marketplace
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        env:
          MARKETPLACE_PAT: ${{ secrets.MARKETPLACE_PAT }}
        run: |
          tfx extension publish \
            --vsix "$GITHUB_WORKSPACE/dist/argos.vsix" \
            --token "$MARKETPLACE_PAT" \
            --no-prompt
