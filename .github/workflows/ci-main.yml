name: CI — main

on:
  push:
    branches: [main]

jobs:
  ci:
    name: Lint / Typecheck / Test / Build / VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm turbo lint

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Test (Vitest)
        run: pnpm turbo test

      - name: Build
        run: pnpm turbo build

      # Becomes non-optional after T-0.4 (vss-extension.json created)
      - name: VSIX dry-run packaging
        run: |
          npm install -g tfx-cli
          if [ -f apps/argos-extension/vss-extension.json ]; then
            mkdir -p "$GITHUB_WORKSPACE/dist"
            cd apps/argos-extension
            tfx extension create \
              --manifest-globs vss-extension.json \
              --output-path "$GITHUB_WORKSPACE/dist/argos.vsix" \
              --no-prompt
          else
            echo "vss-extension.json not yet created (pending T-0.4) — skipping"
          fi

  # ─── T-1.9: E2E against real ADO Cloud instance ─────────────────────────────
  # The secrets context is not available in job-level if: conditions (only step-level).
  # Pattern: check-e2e exposes a boolean output; e2e-cloud reads it via needs context.
  # TODO T-1.9: add server job when argos-test-server.atconseil.io instance is ready.
  check-e2e:
    name: Check E2E secret availability
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      has_pat: ${{ steps.has_pat.outputs.defined }}
    steps:
      - name: Detect ADO_CLOUD_PAT
        id: has_pat
        env:
          ADO_CLOUD_PAT: ${{ secrets.ADO_CLOUD_PAT }}
        run: |
          if [ -n "$ADO_CLOUD_PAT" ]; then
            echo "defined=true" >> "$GITHUB_OUTPUT"
          else
            echo "defined=false" >> "$GITHUB_OUTPUT"
          fi

  e2e-cloud:
    name: E2E — ADO Cloud
    runs-on: ubuntu-latest
    needs: [ci, check-e2e]
    if: needs.check-e2e.outputs.has_pat == 'true'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK (E2E depends on compiled output)
        run: pnpm turbo build --filter=@atconseil/argos-sdk

      - name: Run E2E — Cloud
        run: pnpm --filter @atconseil/argos-e2e test:cloud
        env:
          ADO_CLOUD_ORG_URL: ${{ secrets.ADO_CLOUD_ORG_URL }}
          ADO_CLOUD_PAT: ${{ secrets.ADO_CLOUD_PAT }}
          ADO_CLOUD_PROJECT: ${{ secrets.ADO_CLOUD_PROJECT }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-cloud
          path: tools/e2e/playwright-report/
          retention-days: 14
