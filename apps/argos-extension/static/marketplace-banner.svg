<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Argos — AI-Native Test Management for Azure DevOps">
	<title>Argos — AI-Native Test Management for Azure DevOps</title>

	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#0C447C"/>
			<stop offset="100%" stop-color="#08305A"/>
		</linearGradient>
		<linearGradient id="iconBg" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#E6F1FB"/>
			<stop offset="100%" stop-color="#C9DEEF"/>
		</linearGradient>
		<filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
			<feGaussianBlur stdDeviation="8" result="blur"/>
			<feMerge>
				<feMergeNode in="blur"/>
				<feMergeNode in="SourceGraphic"/>
			</feMerge>
		</filter>
	</defs>

	<rect width="1280" height="640" fill="url(#bg)"/>

	<g opacity="0.06" stroke="#FFFFFF" stroke-width="1">
		<line x1="0" y1="160" x2="1280" y2="160"/>
		<line x1="0" y1="320" x2="1280" y2="320"/>
		<line x1="0" y1="480" x2="1280" y2="480"/>
		<line x1="320" y1="0" x2="320" y2="640"/>
		<line x1="640" y1="0" x2="640" y2="640"/>
		<line x1="960" y1="0" x2="960" y2="640"/>
	</g>

	<!-- Icon block (left) -->
	<g transform="translate(120 160)">
		<rect width="320" height="320" rx="48" ry="48" fill="url(#iconBg)" filter="url(#glow)"/>
		<g transform="translate(80 64)" fill="none" stroke="#0C447C" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
			<path d="M80 192s56-28 56-92V40L80 16L24 40v60c0 64 56 92 56 92z"/>
			<circle cx="80" cy="92" r="26"/>
			<circle cx="80" cy="92" r="10" fill="#0C447C" stroke="none"/>
		</g>
	</g>

	<!-- Text block (right) -->
	<g transform="translate(520 0)" fill="#FFFFFF" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
		<text x="0" y="220" font-size="120" font-weight="700" letter-spacing="-2">Argos</text>
		<text x="0" y="290" font-size="30" font-weight="400" opacity="0.92">AI-Native Test Management for Azure DevOps</text>
		<text x="0" y="335" font-size="20" font-weight="400" opacity="0.7">Test Cases &#183; Test Suites &#183; Test Plans, supercharged by AI.</text>

		<g transform="translate(0 380)" font-size="16" font-weight="500">
			<g>
				<rect x="0" y="0" width="105" height="40" rx="20" ry="20" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.24)" stroke-width="1"/>
				<text x="52.5" y="26" text-anchor="middle" fill="#FFFFFF">Test Case</text>
			</g>
			<g transform="translate(117 0)">
				<rect x="0" y="0" width="110" height="40" rx="20" ry="20" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.24)" stroke-width="1"/>
				<text x="55" y="26" text-anchor="middle" fill="#FFFFFF">Test Suite</text>
			</g>
			<g transform="translate(239 0)">
				<rect x="0" y="0" width="105" height="40" rx="20" ry="20" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.24)" stroke-width="1"/>
				<text x="52.5" y="26" text-anchor="middle" fill="#FFFFFF">Test Plan</text>
			</g>
			<g transform="translate(356 0)">
				<rect x="0" y="0" width="130" height="40" rx="20" ry="20" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.24)" stroke-width="1"/>
				<text x="65" y="26" text-anchor="middle" fill="#FFFFFF">AI Generation</text>
			</g>
			<g transform="translate(498 0)">
				<rect x="0" y="0" width="115" height="40" rx="20" ry="20" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.24)" stroke-width="1"/>
				<text x="57.5" y="26" text-anchor="middle" fill="#FFFFFF">Cloud-only</text>
			</g>
		</g>

		<text x="0" y="525" font-size="14" font-weight="400" opacity="0.5">by ATConseil &#8212; atconseil.info</text>
	</g>
</svg>
